[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [
    ".venv",
    "migrations",
    "dist",
    "build",
]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "F",  # pyflakes
    "I",  # isort (import sorting)
    "B",  # bugbear (common bugs)
    "DJ", # Django-specific rules
]

ignore = [
    "E501", # line length handled by formatter
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"